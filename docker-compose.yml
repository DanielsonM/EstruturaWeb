services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgres://myprop:1397159@db:5432/gestormais
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: myprop
      POSTGRES_PASSWORD: 1397159
      POSTGRES_DB: gestormais
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
